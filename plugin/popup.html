<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Skippy</title>
    <style>
        :root {
            --bg: #111118;
            --surface: #1c1c26;
            --surface-hover: #242433;
            --border: #2e2e3d;
            --text: #f2f2f7;
            --muted: #9b9bb0;
            --accent: #ff4444;
            --accent-hover: #ff5c5c;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --radius: 10px;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            line-height: 1.45;
            color: var(--text);
            background: var(--bg);
        }

        .popup {
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .logo {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--accent), #c81e1e);
            display: grid;
            place-items: center;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .logo svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .header-text h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 650;
            letter-spacing: -0.02em;
        }

        .header-text p {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 12px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-pill.idle {
            color: var(--muted);
        }

        .status-pill.idle .status-dot {
            background: #6b6b80;
        }

        .status-pill.active {
            color: var(--success);
            border-color: rgba(52, 211, 153, 0.35);
            background: rgba(52, 211, 153, 0.08);
        }

        .status-pill.active .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
        }

        .status-pill.pending {
            color: var(--warning);
            border-color: rgba(251, 191, 36, 0.35);
            background: rgba(251, 191, 36, 0.08);
        }

        .status-pill.pending .status-dot {
            background: var(--warning);
            animation: pulse 1.4s ease-in-out infinite;
        }

        .status-pill.failed {
            color: var(--danger);
            border-color: rgba(248, 113, 113, 0.35);
            background: rgba(248, 113, 113, 0.08);
        }

        .status-pill.failed .status-dot {
            background: var(--danger);
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.45;
            }
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
        }

        .section-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .hint {
            margin: 0 0 10px;
            color: var(--muted);
            font-size: 12px;
        }

        .hint code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 11px;
            color: #c4c4d4;
            background: var(--bg);
            padding: 1px 5px;
            border-radius: 4px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            min-width: 0;
            padding: 9px 11px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="text"]::placeholder {
            color: #6b6b80;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.15);
        }

        button {
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s, transform 0.1s;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-primary {
            padding: 9px 14px;
            background: var(--accent);
            color: white;
            white-space: nowrap;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .btn-secondary {
            width: 100%;
            margin-top: 12px;
            padding: 9px 14px;
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #2d2d3f;
        }

        .toast {
            margin-top: 12px;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            animation: fadeIn 0.2s ease;
        }

        .toast.success {
            background: rgba(52, 211, 153, 0.12);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.25);
        }

        .toast.error {
            background: rgba(248, 113, 113, 0.12);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        .toast[hidden] {
            display: none;
        }

        .status-card {
            margin-top: 12px;
            padding: 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .status-card[hidden] {
            display: none;
        }

        .status-card.pending {
            border-color: rgba(251, 191, 36, 0.35);
            background: rgba(251, 191, 36, 0.06);
        }

        .status-card.failed {
            border-color: rgba(248, 113, 113, 0.35);
            background: rgba(248, 113, 113, 0.06);
        }

        .status-card.ready {
            border-color: rgba(52, 211, 153, 0.35);
            background: rgba(52, 211, 153, 0.06);
        }

        .status-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .status-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            font-size: 14px;
        }

        .status-card.pending .status-icon {
            background: rgba(251, 191, 36, 0.15);
        }

        .status-card.failed .status-icon {
            background: rgba(248, 113, 113, 0.15);
        }

        .status-card.ready .status-icon {
            background: rgba(52, 211, 153, 0.15);
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(251, 191, 36, 0.25);
            border-top-color: var(--warning);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .status-title {
            margin: 0;
            font-weight: 600;
            font-size: 13px;
        }

        .status-card.pending .status-title {
            color: var(--warning);
        }

        .status-card.failed .status-title {
            color: var(--danger);
        }

        .status-card.ready .status-title {
            color: var(--success);
        }

        .status-message {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 12px;
            word-break: break-word;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="popup">
        <header class="header">
            <div class="logo" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5v14l11-7L8 5z" />
                </svg>
            </div>
            <div class="header-text">
                <h1>Skippy</h1>
                <p>Skip sponsor segments on YouTube</p>
            </div>
        </header>

        <div id="status-pill" class="status-pill idle">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="status-label">Inactive</span>
        </div>

        <section class="section">
            <label class="section-label" for="server">API server</label>
            <p class="hint">Base URL only — Skippy appends <code>/api/v2/timestamps</code></p>
            <div class="input-row">
                <input type="text" id="server" placeholder="http://localhost:8090" spellcheck="false">
                <button id="save" class="btn-primary" type="button">Save</button>
            </div>
        </section>

        <div id="toast" class="toast" hidden></div>

        <section id="analysis-status" class="status-card" hidden>
            <div class="status-header">
                <div id="status-icon" class="status-icon"></div>
                <div>
                    <p id="status-title" class="status-title"></p>
                    <p id="status-message" class="status-message"></p>
                </div>
            </div>
            <button id="retry" class="btn-secondary" type="button">Try again</button>
        </section>
    </div>

    <script src="ext.js"></script>
    <script src="popup.js"></script>

</body>

</html>
